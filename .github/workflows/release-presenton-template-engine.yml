name: Release presenton-template-engine

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional release version override. Defaults to package.json version.
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      binary_name: ${{ steps.meta.outputs.binary_name }}
      asset_prefix: ${{ steps.meta.outputs.asset_prefix }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          version="${{ github.event.inputs.version }}"
          if [[ -z "$version" ]]; then
            version="$(python3 -c "import json; print(json.load(open('presenton-template-engine/package.json', encoding='utf-8'))['version'])")"
          fi
          version="${version#v}"

          release_tag="presenton-template-engine-v${version}"
          release_name="presenton-template-engine v${version}"
          binary_name="presenton-template-engine-plugin"
          asset_prefix="${binary_name}-v${version}"

          {
            echo "version=$version"
            echo "release_tag=$release_tag"
            echo "release_name=$release_name"
            echo "binary_name=$binary_name"
            echo "asset_prefix=$asset_prefix"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            asset_suffix: darwin-amd64
            archive_format: tar.gz
          - runner: macos-15
            asset_suffix: darwin-arm64
            archive_format: tar.gz
          - runner: windows-2025
            asset_suffix: windows-amd64
            archive_format: zip
    defaults:
      run:
        shell: bash
    env:
      PROJECT_DIR: presenton-template-engine
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: presenton-template-engine/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: npm ci

      - name: Build binary
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./build_binary.sh

      - name: Package Unix release assets
        if: ${{ matrix.archive_format == 'tar.gz' }}
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          BINARY_NAME: ${{ needs.prepare.outputs.binary_name }}
          ASSET_PREFIX: ${{ needs.prepare.outputs.asset_prefix }}
          ASSET_SUFFIX: ${{ matrix.asset_suffix }}
          RELEASE_DIR: ${{ runner.temp }}/release-assets
        run: |
          set -euo pipefail

          mkdir -p "$RELEASE_DIR/stage"
          cp "bundle/$BINARY_NAME" "$RELEASE_DIR/stage/$BINARY_NAME"

          archive_name="${ASSET_PREFIX}-${ASSET_SUFFIX}.tar.gz"
          tar -C "$RELEASE_DIR/stage" -czf "$RELEASE_DIR/$archive_name" "$BINARY_NAME"
          (
            cd "$RELEASE_DIR"
            shasum -a 256 "$archive_name" > "$archive_name.sha256"
          )

      - name: Package Windows release assets
        if: ${{ matrix.archive_format == 'zip' }}
        shell: pwsh
        env:
          PROJECT_PATH: ${{ github.workspace }}/presenton-template-engine
          BINARY_NAME: ${{ needs.prepare.outputs.binary_name }}
          ASSET_PREFIX: ${{ needs.prepare.outputs.asset_prefix }}
          ASSET_SUFFIX: ${{ matrix.asset_suffix }}
          RELEASE_DIR: ${{ runner.temp }}/release-assets
        run: |
          $releaseDir = $env:RELEASE_DIR
          $stageDir = Join-Path $releaseDir "stage"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null

          $binaryName = "$env:BINARY_NAME.exe"
          $sourcePath = Join-Path $env:PROJECT_PATH "bundle/$binaryName"
          $stageBinaryPath = Join-Path $stageDir $binaryName
          Copy-Item -LiteralPath $sourcePath -Destination $stageBinaryPath -Force

          $archiveName = "$env:ASSET_PREFIX-$env:ASSET_SUFFIX.zip"
          $archivePath = Join-Path $releaseDir $archiveName
          Compress-Archive -LiteralPath $stageBinaryPath -DestinationPath $archivePath -Force

          $hash = (Get-FileHash -LiteralPath $archivePath -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -LiteralPath "$archivePath.sha256" -Value "$hash  $archiveName" -Encoding ascii

      - name: Upload packaged assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.asset_suffix }}
          path: |
            ${{ runner.temp }}/release-assets/*.tar.gz
            ${{ runner.temp }}/release-assets/*.zip
            ${{ runner.temp }}/release-assets/*.sha256
          if-no-files-found: error

  release:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: release-assets

      - name: Publish GitHub release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
          ASSET_DIR: ${{ github.workspace }}/release-assets
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=("$ASSET_DIR"/*)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No release assets found in $ASSET_DIR" >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --repo "$GH_REPO" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --repo "$GH_REPO" --title "$RELEASE_NAME" --target "$GITHUB_SHA" --generate-notes
          fi
