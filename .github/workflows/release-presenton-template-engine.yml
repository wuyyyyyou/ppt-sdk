name: Release presenton-template-engine

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          version="$(python3 -c "import json; print(json.load(open('presenton-template-engine/manifest.json', encoding='utf-8'))['version'])")"
          release_tag="presenton-template-engine-v${version}"
          release_name="presenton-template-engine v${version}"

          {
            echo "version=$version"
            echo "release_tag=$release_tag"
            echo "release_name=$release_name"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            asset_suffix: darwin-x86_64
          - runner: macos-15
            asset_suffix: darwin-arm64
          - runner: windows-2025
            asset_suffix: windows-x86_64
    defaults:
      run:
        shell: bash
    env:
      PROJECT_DIR: presenton-template-engine
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: presenton-template-engine/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: npm ci

      - name: Verify tool manifest synchronization
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -euo pipefail
          npm run sync:tool-manifests
          git diff --exit-code

      - name: Build and validate binary release package
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./build_binary.sh --test

      - name: Upload packaged assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.asset_suffix }}
          path: |
            presenton-template-engine/bundle/*.tar.gz
            presenton-template-engine/bundle/*.zip
            presenton-template-engine/bundle/*.sha256
          if-no-files-found: error

  release:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: release-assets

      - name: Publish GitHub release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
          ASSET_DIR: ${{ github.workspace }}/release-assets
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=("$ASSET_DIR"/*)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No release assets found in $ASSET_DIR" >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --repo "$GH_REPO" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --repo "$GH_REPO" --title "$RELEASE_NAME" --target "$GITHUB_SHA" --generate-notes
          fi
