name: Release anna-search

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          name="$(python3 -c "import json; print(json.load(open('ppt-app/executas/anna-search/manifest.json', encoding='utf-8'))['name'])")"
          version="$(python3 -c "import json; print(json.load(open('ppt-app/executas/anna-search/manifest.json', encoding='utf-8'))['version'])")"
          release_tag="${name}-v${version}"
          release_name="${name} v${version}"

          {
            echo "release_tag=$release_tag"
            echo "release_name=$release_name"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            asset_suffix: linux-x86_64
          - runner: ubuntu-22.04-arm
            asset_suffix: linux-aarch64
          - runner: macos-15-intel
            asset_suffix: darwin-x86_64
          - runner: macos-15
            asset_suffix: darwin-arm64
          - runner: windows-2025
            asset_suffix: windows-x86_64
    defaults:
      run:
        shell: bash
    env:
      PROJECT_DIR: ppt-app/executas/anna-search
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Verify tool manifest synchronization
        run: |
          set -euo pipefail
          node ppt-app/scripts/sync-tool-manifests.mjs
          git diff --exit-code

      - name: Build and validate binary release package
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./build_binary.sh --test

      - name: Upload packaged assets
        uses: actions/upload-artifact@v4
        with:
          name: anna-search-release-assets-${{ matrix.asset_suffix }}
          path: |
            ppt-app/executas/anna-search/bundle/*.tar.gz
            ppt-app/executas/anna-search/bundle/*.zip
            ppt-app/executas/anna-search/bundle/*.sha256
          if-no-files-found: error

  release:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          pattern: anna-search-release-assets-*
          merge-multiple: true
          path: release-assets

      - name: Publish GitHub release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
          ASSET_DIR: ${{ github.workspace }}/release-assets
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=("$ASSET_DIR"/*)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No release assets found in $ASSET_DIR" >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --repo "$GH_REPO" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --repo "$GH_REPO" --title "$RELEASE_NAME" --target "$GITHUB_SHA" --generate-notes
          fi
