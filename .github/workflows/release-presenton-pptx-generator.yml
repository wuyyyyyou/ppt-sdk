name: Release ppt-gener

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          name="$(python3 -c "import json; print(json.load(open('ppt-app/executas/ppt-gener/manifest.json', encoding='utf-8'))['name'])")"
          version="$(python3 -c "import json; print(json.load(open('ppt-app/executas/ppt-gener/manifest.json', encoding='utf-8'))['version'])")"
          release_tag="${name}-v${version}"
          release_name="${name} v${version}"

          {
            echo "version=$version"
            echo "release_tag=$release_tag"
            echo "release_name=$release_name"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            asset_suffix: linux-x86_64
            cairo_runtime_dir: /usr/lib/x86_64-linux-gnu
          - runner: ubuntu-22.04-arm
            asset_suffix: linux-aarch64
            cairo_runtime_dir: /usr/lib/aarch64-linux-gnu
          - runner: macos-15-intel
            asset_suffix: darwin-x86_64
            cairo_runtime_dir: /usr/local/opt/cairo/lib
          - runner: macos-15
            asset_suffix: darwin-arm64
            cairo_runtime_dir: /opt/homebrew/opt/cairo/lib
          - runner: windows-2025
            asset_suffix: windows-x86_64
            cairo_runtime_dir: C:/msys64/mingw64/bin
    defaults:
      run:
        shell: bash
    env:
      PROJECT_DIR: ppt-app/executas/ppt-gener
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install Cairo runtime on Linux
        if: ${{ startsWith(matrix.runner, 'ubuntu-') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2 libcairo-gobject2 libffi8

      - name: Install Cairo runtime on macOS
        if: ${{ startsWith(matrix.runner, 'macos-') }}
        run: brew install cairo libffi

      - name: Install Cairo runtime on Windows
        if: ${{ matrix.runner == 'windows-2025' }}
        uses: msys2/setup-msys2@v2
        with:
          location: 'C:\msys64'
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-cairo

      - name: Verify tool manifest synchronization
        run: |
          set -euo pipefail
          node ppt-app/scripts/sync-ppt-gener-manifest.mjs
          git diff --exit-code

      - name: Build and validate binary release package
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          CAIRO_RUNTIME_DIR: ${{ matrix.cairo_runtime_dir }}
        run: ./build_binary.sh --test

      - name: Upload packaged assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.asset_suffix }}
          path: |
            ppt-app/executas/ppt-gener/bundle/*.tar.gz
            ppt-app/executas/ppt-gener/bundle/*.zip
            ppt-app/executas/ppt-gener/bundle/*.sha256
          if-no-files-found: error

  release:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: release-assets

      - name: Publish GitHub release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
          ASSET_DIR: ${{ github.workspace }}/release-assets
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=("$ASSET_DIR"/*)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No release assets found in $ASSET_DIR" >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --repo "$GH_REPO" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --repo "$GH_REPO" --title "$RELEASE_NAME" --target "$GITHUB_SHA" --generate-notes
          fi
