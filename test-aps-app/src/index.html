<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Host Upload / APS 测试</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>Host Upload / APS 测试</h1>
          <p>后端 Executa 调用 Host Upload、APS Files 与 APS KV，前端验证结果。所有关键步骤都会写入日志。</p>
        </div>
        <div class="status">
          <span id="conn-dot" class="dot dot--off"></span>
          <span id="conn-label">未连接</span>
        </div>
      </header>

      <nav class="tabs" aria-label="测试页面">
        <button class="tab tab--active" type="button" data-tab="host-upload" aria-selected="true">Host Upload 测试</button>
        <button class="tab" type="button" data-tab="aps-files" aria-selected="false">APS Files 测试</button>
        <button class="tab" type="button" data-tab="aps-kv" aria-selected="false">APS KV 测试</button>
      </nav>

      <section class="tab-panel" data-panel="host-upload">
        <section class="layout">
          <form id="host-upload-form" class="panel" autocomplete="off">
            <div class="panel__head">
              <h2>Host Upload 参数</h2>
              <button id="reset-form" class="btn btn--ghost" type="button">重置</button>
            </div>

            <label class="field">
              <span>上传模式</span>
              <select id="mode">
                <option value="inline">inline：小文件，base64 进 RPC</option>
                <option value="negotiate">negotiate：后端 PUT 到 R2 后 confirm</option>
              </select>
            </label>

            <label class="field">
              <span>文件名</span>
              <input id="filename" value="host-upload-test.txt" />
            </label>

            <label class="field">
              <span>MIME 类型</span>
              <input id="mime-type" value="text/plain" />
            </label>

            <label class="field">
              <span>Purpose</span>
              <select id="purpose">
                <option value="user_artifact">user_artifact</option>
                <option value="image_input">image_input</option>
                <option value="image_reference">image_reference</option>
              </select>
            </label>

            <label class="field">
              <span>内容重复次数</span>
              <input id="repeat" type="number" min="1" max="20000" value="1" />
            </label>

            <label class="field field--wide">
              <span>文本内容</span>
              <textarea id="content" rows="8">这是一份来自 Host Upload 测试 App 的后端上传文件。</textarea>
            </label>

            <div class="actions">
              <button id="upload-btn" class="btn btn--primary" type="submit">调用后端上传</button>
              <button id="download-btn" class="btn" type="button" disabled>前端下载验证</button>
              <button id="open-btn" class="btn btn--ghost" type="button" disabled>直接打开 URL</button>
            </div>
          </form>

          <section class="panel result">
            <div class="panel__head">
              <h2>最近一次结果</h2>
              <button id="copy-result" class="btn btn--ghost" type="button" disabled>复制 JSON</button>
            </div>
            <dl class="kv">
              <div>
                <dt>URL</dt>
                <dd id="result-url">-</dd>
              </div>
              <div>
                <dt>R2 Key</dt>
                <dd id="result-key">-</dd>
              </div>
              <div>
                <dt>大小</dt>
                <dd id="result-bytes">-</dd>
              </div>
              <div>
                <dt>过期</dt>
                <dd id="result-expiry">-</dd>
              </div>
            </dl>
            <pre id="result-json" class="json">{}</pre>
          </section>
        </section>
      </section>

      <section class="tab-panel" data-panel="aps-files" hidden>
        <section class="layout">
          <form id="aps-files-form" class="panel" autocomplete="off">
            <div class="panel__head">
              <h2>APS Files 参数</h2>
            </div>

            <label class="field">
              <span>文件路径</span>
              <input id="aps-path" value="test-aps/hello.txt" />
            </label>

            <label class="field">
              <span>Scope</span>
              <select id="aps-scope">
                <option value="user">user：用户级</option>
                <option value="app">app：应用级</option>
                <option value="tool">tool：工具级</option>
              </select>
            </label>

            <label class="field">
              <span>Content-Type</span>
              <input id="aps-content-type" value="text/plain; charset=utf-8" />
            </label>

            <label class="field">
              <span>内容重复次数</span>
              <input id="aps-repeat" type="number" min="1" max="20000" value="1" />
            </label>

            <label class="field">
              <span>下载 URL 有效期（秒）</span>
              <input id="aps-expires-in" type="number" min="60" max="86400" value="1800" />
            </label>

            <label class="field">
              <span>列表 Prefix</span>
              <input id="aps-prefix" value="test-aps/" />
            </label>

            <label class="field field--wide">
              <span>文本内容</span>
              <textarea id="aps-content" rows="8">这是一份来自 APS Files 测试页面的后端上传文件。</textarea>
            </label>

            <div class="actions">
              <button id="aps-upload-btn" class="btn btn--primary" type="submit">上传到 APS Files</button>
              <button id="aps-download-url-btn" class="btn" type="button">签下载 URL</button>
              <button id="aps-list-btn" class="btn" type="button">列文件</button>
              <button id="aps-delete-btn" class="btn btn--ghost" type="button">删除文件</button>
            </div>
          </form>

          <section class="panel result">
            <div class="panel__head">
              <h2>APS 最近一次结果</h2>
              <button id="aps-copy-result" class="btn btn--ghost" type="button" disabled>复制 JSON</button>
            </div>
            <dl class="kv">
              <div>
                <dt>Path</dt>
                <dd id="aps-result-path">-</dd>
              </div>
              <div>
                <dt>URL</dt>
                <dd id="aps-result-url">-</dd>
              </div>
              <div>
                <dt>ETag</dt>
                <dd id="aps-result-etag">-</dd>
              </div>
              <div>
                <dt>大小</dt>
                <dd id="aps-result-bytes">-</dd>
              </div>
            </dl>
            <div class="actions result-actions">
              <button id="aps-download-btn" class="btn" type="button" disabled>前端下载验证</button>
              <button id="aps-open-btn" class="btn btn--ghost" type="button" disabled>直接打开 URL</button>
            </div>
            <pre id="aps-result-json" class="json">{}</pre>
          </section>
        </section>
      </section>

      <section class="tab-panel" data-panel="aps-kv" hidden>
        <section class="layout">
          <form id="aps-kv-form" class="panel" autocomplete="off">
            <div class="panel__head">
              <h2>APS KV 参数</h2>
            </div>

            <label class="field">
              <span>Key</span>
              <input id="kv-key" value="test-aps/kv/demo" />
            </label>

            <label class="field">
              <span>Scope</span>
              <select id="kv-scope">
                <option value="user">user：用户级</option>
                <option value="app">app：应用级</option>
                <option value="tool">tool：工具级</option>
              </select>
            </label>

            <label class="field">
              <span>TTL（秒，留空为永久）</span>
              <input id="kv-ttl" type="number" min="1" max="604800" placeholder="例如 3600" />
            </label>

            <label class="field">
              <span>If-Match ETag</span>
              <input id="kv-if-match" placeholder="读取后自动回填，可留空" />
            </label>

            <label class="field">
              <span>列表 Prefix</span>
              <input id="kv-prefix" value="test-aps/kv/" />
            </label>

            <label class="field">
              <span>列表数量</span>
              <input id="kv-limit" type="number" min="1" max="100" value="20" />
            </label>

            <label class="field field--wide">
              <span>JSON Value</span>
              <textarea id="kv-value" rows="10">{
  "title": "APS KV 测试",
  "count": 1,
  "updated_at": "2026-06-02T00:00:00Z"
}</textarea>
            </label>

            <div class="actions">
              <button id="kv-set-btn" class="btn btn--primary" type="submit">写入 KV</button>
              <button id="kv-get-btn" class="btn" type="button">读取 KV</button>
              <button id="kv-list-btn" class="btn" type="button">列 KV</button>
              <button id="kv-delete-btn" class="btn btn--ghost" type="button">删除 KV</button>
            </div>
          </form>

          <section class="panel result">
            <div class="panel__head">
              <h2>KV 最近一次结果</h2>
              <button id="kv-copy-result" class="btn btn--ghost" type="button" disabled>复制 JSON</button>
            </div>
            <dl class="kv">
              <div>
                <dt>Key</dt>
                <dd id="kv-result-key">-</dd>
              </div>
              <div>
                <dt>Exists</dt>
                <dd id="kv-result-exists">-</dd>
              </div>
              <div>
                <dt>ETag</dt>
                <dd id="kv-result-etag">-</dd>
              </div>
              <div>
                <dt>大小</dt>
                <dd id="kv-result-bytes">-</dd>
              </div>
            </dl>
            <pre id="kv-result-json" class="json">{}</pre>
          </section>
        </section>
      </section>

      <section class="panel logs-panel">
        <div class="panel__head">
          <h2>前端诊断日志</h2>
          <div class="toolbar">
            <button id="copy-logs" class="btn btn--ghost" type="button">复制日志</button>
            <button id="clear-logs" class="btn btn--ghost" type="button">清空</button>
          </div>
        </div>
        <ol id="logs" class="logs" aria-live="polite"></ol>
      </section>
    </main>

    <script src="/static/anna-apps/_sdk/0.1.0/index.js" defer></script>
    <script src="app.js" defer></script>
  </body>
</html>
